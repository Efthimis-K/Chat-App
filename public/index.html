<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socket.io Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="login-screen" id="loginScreen">
      <div class="glass-panel">
        <h1>Welcome to Chat</h1>
        <form id="loginForm">
          <input type="text" id="usernameInput" placeholder="Enter your username" required autocomplete="off">
          <select id="roomSelect" required>
            <option value="" disabled selected>Select a room</option>
            <option value="general">General</option>
            <option value="tech">Tech</option>
            <option value="random">Random</option>
            <option value="gaming">Gaming</option>
          </select>
          <button type="submit">Join Chat</button>
        </form>
      </div>
    </div>

    <div class="chat-screen" id="chatScreen" style="display: none;">
      <aside class="sidebar">
        <div class="user-info">
          <span id="currentUser"></span>
        </div>
        <div class="room-info">
          <span id="currentRoom"></span>
        </div>
        <button id="leaveRoomBtn" class="leave-room-btn">Leave Room</button>
        <div class="online-users">
          <h3>Online</h3>
          <ul id="userList"></ul>
        </div>
      </aside>

      <main class="chat-main">
        <div class="messages-container" id="messagesContainer">
          <div id="messages"></div>
        </div>
        <form id="messageForm" class="message-form">
          <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
          <button type="submit">Send</button>
        </form>
      </main>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
